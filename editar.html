<!DOCTYPE html>
<html lang="pt-br">
<head>
    
    <title>Editar gastos</title>
    <link rel="stylesheet" href="{{ url_for ('static', filename='style.css') }}">
</head>
<body>
    <div class="conteinerDois">
    <h2 class="Q">Editar Gasto:</h2>

<div class="p">
    <form method="POST">
        <label class="desc">Descrição</label>
        <input type="text" name="descricao" value=" {{ gasto[1] }}" required>

        <label class="val">Valor</label>
        <input type="number" step="0.01" name="valor" value="{{ gasto[2] }}" required>

        <button type="submit">Salvar Alterações</button>
    </form>

    <a href="/">Voltar</a>
    </div>
    </div>
</body>
</html>
